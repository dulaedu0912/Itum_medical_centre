{% extends "base.html" %}
{% block title %}Book Appointment - ITUM Medical Centre{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-4">Book an Appointment</h3>

                {% if errors %}
                <div class="alert alert-danger">
                    <ul class="mb-0">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Select Doctor</label>
                        <select name="doctor_id" class="form-select" required>
                            <option value="">-- Choose a Doctor --</option>
                            {% for doctor in doctors %}
                            <option value="{{ doctor['id'] }}"
                                {{ 'selected' if form_data and form_data.get('doctor_id')|string == doctor['id']|string }}>
                                {{ doctor['name'] }} ({{ doctor['specialization'] }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control"
                                   value="{{ form_data.get('date', '') if form_data else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Time</label>
                            <input type="time" name="time" class="form-control"
                                   value="{{ form_data.get('time', '') if form_data else '' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Reason for Visit</label>
                        <textarea name="reason" class="form-control" rows="3"
                                  placeholder="Briefly describe your symptoms or reason for visit">{{ form_data.get('reason', '') if form_data else '' }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Book Appointment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
