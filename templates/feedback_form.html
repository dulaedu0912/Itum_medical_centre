{% extends "base.html" %}
{% block title %}Give Feedback - ITUM Medical Centre{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="mb-4">Give Feedback</h3>

                {% if errors %}
                <div class="alert alert-danger">
                    <ul class="mb-0">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Doctor</label>
                        <select name="doctor_id" class="form-select" required>
                            <option value="">-- Select a Doctor --</option>
                            {% for doctor in doctors %}
                            <option value="{{ doctor['id'] }}"
                                {{ 'selected' if form_data and form_data.get('doctor_id')|string == doctor['id']|string }}>
                                {{ doctor['name'] }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <div>
                            {% for i in range(1, 6) %}
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="rating"
                                       value="{{ i }}" id="rating{{ i }}"
                                       {{ 'checked' if form_data and form_data.get('rating')|string == i|string }} required>
                                <label class="form-check-label" for="rating{{ i }}">{{ i }}</label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Comment</label>
                        <textarea name="comment" class="form-control" rows="4"
                                  placeholder="Share your experience...">{{ form_data.get('comment', '') if form_data else '' }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Submit Feedback</button>
                </form>

                <p class="text-center mt-3">
                    <a href="{{ url_for('feedback.my_feedback') }}">View my feedback</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
